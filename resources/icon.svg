<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#4f46e5"/>
    </linearGradient>
    <linearGradient id="shine" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#818cf8;stop-opacity:0.4"/>
      <stop offset="50%" style="stop-color:#818cf8;stop-opacity:0"/>
    </linearGradient>
    <linearGradient id="terminal" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1e1b4b"/>
      <stop offset="100%" style="stop-color:#0f0a2e"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect x="16" y="16" width="480" height="480" rx="96" ry="96" fill="url(#bg)"/>
  <!-- Subtle shine overlay -->
  <rect x="16" y="16" width="480" height="480" rx="96" ry="96" fill="url(#shine)"/>
  <!-- Terminal window body -->
  <rect x="72" y="100" width="368" height="296" rx="24" ry="24" fill="url(#terminal)"/>
  <!-- Terminal title bar -->
  <rect x="72" y="100" width="368" height="44" rx="24" ry="24" fill="#1e1b4b"/>
  <rect x="72" y="120" width="368" height="24" fill="#1e1b4b"/>
  <!-- Window dots -->
  <circle cx="104" cy="122" r="8" fill="#ef4444" opacity="0.9"/>
  <circle cx="130" cy="122" r="8" fill="#f59e0b" opacity="0.9"/>
  <circle cx="156" cy="122" r="8" fill="#22c55e" opacity="0.9"/>
  <!-- Terminal prompt chevron > -->
  <path d="M112 200 L152 232 L112 264" stroke="#22c55e" stroke-width="14" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- Cursor block -->
  <rect x="172" y="218" width="12" height="28" rx="2" fill="#e2e8f0" opacity="0.9">
    <animate attributeName="opacity" values="0.9;0.2;0.9" dur="1.2s" repeatCount="indefinite"/>
  </rect>
  <!-- AI neural dots pattern -->
  <circle cx="290" cy="210" r="6" fill="#818cf8" opacity="0.8"/>
  <circle cx="330" cy="195" r="5" fill="#a78bfa" opacity="0.7"/>
  <circle cx="365" cy="215" r="6" fill="#818cf8" opacity="0.8"/>
  <circle cx="310" cy="245" r="5" fill="#a78bfa" opacity="0.7"/>
  <circle cx="350" cy="255" r="5" fill="#c4b5fd" opacity="0.6"/>
  <circle cx="385" cy="240" r="4" fill="#a78bfa" opacity="0.5"/>
  <!-- Neural connection lines -->
  <line x1="290" y1="210" x2="330" y2="195" stroke="#818cf8" stroke-width="2" opacity="0.4"/>
  <line x1="330" y1="195" x2="365" y2="215" stroke="#818cf8" stroke-width="2" opacity="0.4"/>
  <line x1="290" y1="210" x2="310" y2="245" stroke="#818cf8" stroke-width="2" opacity="0.4"/>
  <line x1="365" y1="215" x2="385" y2="240" stroke="#818cf8" stroke-width="2" opacity="0.4"/>
  <line x1="310" y1="245" x2="350" y2="255" stroke="#818cf8" stroke-width="2" opacity="0.4"/>
  <line x1="350" y1="255" x2="385" y2="240" stroke="#818cf8" stroke-width="2" opacity="0.4"/>
  <line x1="330" y1="195" x2="310" y2="245" stroke="#818cf8" stroke-width="1.5" opacity="0.3"/>
  <line x1="365" y1="215" x2="350" y2="255" stroke="#818cf8" stroke-width="1.5" opacity="0.3"/>
  <!-- Output lines -->
  <rect x="112" y="296" width="180" height="6" rx="3" fill="#475569" opacity="0.5"/>
  <rect x="112" y="316" width="130" height="6" rx="3" fill="#475569" opacity="0.35"/>
  <rect x="112" y="336" width="220" height="6" rx="3" fill="#475569" opacity="0.25"/>
  <!-- Bottom accent glow -->
  <ellipse cx="256" cy="412" rx="120" ry="6" fill="#818cf8" opacity="0.3"/>
</svg>
